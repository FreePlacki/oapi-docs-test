name: OpenAPI Docs

on:
  push:
    branches: [ "main" ]
    paths:
      - 'contract/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Redoc CLI
        run: npm install -g redoc-cli

      - name: Generate docs
        run: |
          mkdir -p public

          redoc-cli bundle contract/backend/openapi.yaml -o public/backend.html
          redoc-cli bundle contract/gpu/openapi.yaml -o public/gpu.html

          cat <<EOF > public/index.html
          <html>
            <body>
              <h1>REST API Docs</h1>
              <ul>
                <li><a href="./backend.html">Backend API</a></li>
                <li><a href="./gpu.html">GPU API</a></li>
              </ul>
            </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
