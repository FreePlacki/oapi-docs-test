<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>API Docs</title>

  <style>
    :root {
      --bg-color: #282828;
      --text-color: #ebdbb2;

      --red: #fb4934;
      --green: #b8bb26;
      --yellow: #fabd2f;
      --blue: #83a598;
      --purple: #d3869b;
      --aqua: #8ec07c;
      --gray: #928374;

      --bg-color-h: #1d2021;
      --text-color-h: #fbf1c7;

      --red-h: #cc241d;
      --green-h: #98971a;
      --yellow-h: #d79921;
      --blue-h: #458588;
      --purple-h: #b16286;
      --aqua-h: #689d6a;
      --gray-h: #7c6f64;
    }

    body {
      margin: 0;
      background: var(--bg-color-h);
      color: var(--text-color-h);
    }
  </style>
</head>

<body>
  <redoc></redoc>

  <script src="https://cdn.jsdelivr.net/npm/redoc/bundles/redoc.standalone.js"></script>

<script>
  Redoc.init(undefined, {
    theme: {
      colors: {
        primary: { main: "#83a598" },
        success: { main: "#b8bb26" },
        warning: { main: "#fabd2f" },
        error:   { main: "#fb4934" },
        text: {
          primary: "#fbf1c7",
          secondary: "#ebdbb2"
        },
        http: {
          get: "#83a598",
          post: "#b8bb26",
          put: "#fabd2f",
          delete: "#fb4934"
        }
      },
      sidebar: {
        backgroundColor: "#1d2021",
        textColor: "#ebdbb2"
      },
      rightPanel: {
        backgroundColor: "#282828",
        textColor: "#ebdbb2"
      }
    }
  }, document.querySelector('redoc'));
</script>
</body>
</html>
